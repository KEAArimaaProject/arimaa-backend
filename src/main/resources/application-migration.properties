# Activated with: spring.profiles.active=migration
# Requires MySQL (JPA) and Neo4j per application.properties / local overrides.

# Do not start the repo root compose.yaml (mydatabase on a random port). Use MySQL from
# Database/docker-compose.mysql.yml (e.g. localhost:3307 / arimaadockermysqldb), started separately.
spring.docker.compose.enabled=false

# Leave unset (or empty) to run all steps. To run a subset, use indexed properties, e.g.:
# migration.enabled-targets[0]=neo4j
migration.enabled-targets[0]=mongodb
#
# migration.enabled-steps[0]=country
# migration.enabled-steps[1]=match
#
# Targets (use with migration.enabled-targets; case-insensitive):
#   neo4j, mongodb (or mongo)
#
# Step ids (use with migration.enabled-steps; case-insensitive):
#   country, event, game-type, position, puzzle, player, match, move, solution,
#   opening-by-match, opening-by-puzzle, user, user-mongo
#
# Order is fixed by each migration's Ordered#getOrder(); enabled-steps only filters which steps run.

migration.batch-size=500
migration.dry-run=false
