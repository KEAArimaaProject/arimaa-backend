spring.application.name=arimaa-backend

# Tell Spring Boot where the Docker Compose file is (so it doesn't look for ./compose.yaml)
spring.docker.compose.file=Database/docker-compose.mysql.yml

# --- SQL (MySQL) source via Hibernate/JPA ---
spring.datasource.url=jdbc:mysql://localhost:5000/arimaadockermysqldb
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
# Use annotated table/column names as-is; default Spring lowercasing breaks MySQL (Docker/Linux) with PascalCase tables like `Countries`.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# --- MongoDB target ---
spring.mongodb.uri=mongodb://localhost:27017/arimaadockermysqldb

# --- Neo4j target ---
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=arimaa123

# Run the one-time migrator explicitly:
# spring.profiles.active=migration
