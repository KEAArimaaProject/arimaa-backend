spring.application.name=arimaa-backend

# Tell Spring Boot where the Docker Compose file is (so it doesn't look for ./compose.yaml)
#spring.docker.compose.file=Database/docker-compose.mysql.yml
#spring.docker.compose.env-file=.env
spring.config.import=optional:file:.env[.properties]
spring.docker.compose.enabled=false

# --- SQL (MySQL) source via Hibernate/JPA ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
# Use annotated table/column names as-is; default Spring lowercasing breaks MySQL (Docker/Linux) with PascalCase tables like `Countries`.
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# --- MongoDB target ---
spring.mongodb.uri=${SPRING_MONGODB_URI}

# --- Neo4j target ---
spring.neo4j.uri=${SPRING_NEO4J_URI}
spring.neo4j.authentication.username=${SPRING_NEO4J_USERNAME}
spring.neo4j.authentication.password=${SPRING_NEO4J_PASSWORD}

# Run the one-time migrator explicitly:
# spring.profiles.active=migration

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration
